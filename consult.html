  <main>
    <section class="page-hero"><div class="container page-title"><p class="eyebrow">t_inquiries</p><h1>상담 문의</h1><p>상담 신청, 질문, 답변, 처리 상태를 저장하기 위한 문의 화면입니다.</p></div></section>
    <section class="section"><div class="container split">
      <form class="panel form" data-message="문의가 임시 접수되었습니다. 실제 개발에서는 t_inquiries에 저장합니다.">
        <div class="grid two"><div class="field"><label for="name">이름</label><input id="name" placeholder="홍길동"></div><div class="field"><label for="phone">연락처</label><input id="phone" placeholder="010-0000-0000"></div></div>
        <div class="field"><label for="kind">문의 종류</label><select id="kind"><option>과정 상담</option><option>국비지원 문의</option><option>서류 제출</option><option>기타 질문</option></select></div>
        <div class="field"><label for="body">문의 내용</label><textarea id="body" placeholder="궁금한 내용을 적어주세요."></textarea></div>
        <button class="button primary" type="submit">문의 남기기</button>
      </form>
      <aside class="panel"><h3>처리 상태 예시</h3><ul class="list"><li>접수: 새 문의가 들어온 상태</li><li>상담중: 담당자가 연락 중</li><li>답변완료: 답변 또는 안내 완료</li><li>보류: 추가 확인 필요</li></ul></aside>
    </div></section>
